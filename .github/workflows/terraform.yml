name: Terraform Dynamic Environment

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}

  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  TF_VAR_mysql_admin_user: nextcloudadmin
  TF_VAR_mysql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  TF_VAR_nextcloud_admin_user: admin
  TF_VAR_nextcloud_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    timeout-minutes: 90

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # UNIQUE SUFFIX
      # ==========================================
      - name: Generate suffix
        id: suffix
        run: |
          echo "SUFFIX=$(date +%s)" >> $GITHUB_ENV

      # ==========================================
      # TERRAFORM
      # ==========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ==========================================
      # TERRAFORM INIT
      # ==========================================
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=${SUFFIX}.tfstate"

      # ==========================================
      # VALIDATE
      # ==========================================
      - name: Terraform Validate
        run: terraform validate

      # ==========================================
      # PLAN
      # ==========================================
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment_suffix=${SUFFIX}" \
            -out=tfplan

      # ==========================================
      # APPLY
      # ==========================================
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # ==========================================
      # OUTPUT
      # ==========================================
      - name: Terraform Output
        run: terraform output