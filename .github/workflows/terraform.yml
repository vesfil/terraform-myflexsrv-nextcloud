name: Terraform Dynamic Environment

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}

  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  TF_VAR_mysql_admin_user: nextcloudadmin
  TF_VAR_mysql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  TF_VAR_nextcloud_admin_user: admin
  TF_VAR_nextcloud_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # AZURE LOGIN
      # ==========================================
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ==========================================
      # SEQUENTIAL SUFFIX (01-99)
      # ==========================================
      - name: Get environment number
        env:
          STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
          STORAGE_CONTAINER: tfstate
        run: |
          set -e

          echo "Storage account: $STORAGE_ACCOUNT"

          LAST=$(az storage blob download \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$STORAGE_CONTAINER" \
            --name counter.txt \
            --auth-mode login \
            --query content -o tsv 2>/dev/null || echo "0")

          LAST_NUM=$(echo "$LAST" | tr -cd '0-9')
          if [ -z "$LAST_NUM" ]; then LAST_NUM=0; fi

          NEXT=$((10#$LAST_NUM + 1))

          SUFFIX=$(printf "%02d" $NEXT)

          echo "SUFFIX=$SUFFIX" >> $GITHUB_ENV

          echo "$SUFFIX" | az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$STORAGE_CONTAINER" \
            --name counter.txt \
            --overwrite \
            --auth-mode login

      # ==========================================
      # TERRAFORM SETUP
      # ==========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ==========================================
      # INIT
      # ==========================================
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=rg-nextcloud-${SUFFIX}.tfstate"

      # ==========================================
      # VALIDATE
      # ==========================================
      - name: Terraform Validate
        run: terraform validate

      # ==========================================
      # PLAN
      # ==========================================
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment_suffix=${SUFFIX}" \
            -out=tfplan

      # ==========================================
      # APPLY
      # ==========================================
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # ==========================================
      # OUTPUT
      # ==========================================
      - name: Terraform Output
        run: terraform output