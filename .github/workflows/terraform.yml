name: Terraform PR Environment

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:

  # =========================================================
  # DEPLOY EPHEMERAL ENVIRONMENT
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================
      # AZURE LOGIN
      # =====================================================
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # =====================================================
      # TERRAFORM
      # =====================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =====================================================
      # GENERATE UNIQUE SUFFIX
      # =====================================================
      - name: Generate Environment Suffix
        run: |
          echo "TF_VAR_environment_suffix=pr${PR_NUMBER}" >> $GITHUB_ENV

      # =====================================================
      # TERRAFORM INIT
      # =====================================================
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=pr-${PR_NUMBER}.tfstate"

      # =====================================================
      # VALIDATE
      # =====================================================
      - name: Terraform Validate
        run: terraform validate

      # =====================================================
      # PLAN
      # =====================================================
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment_suffix=pr${PR_NUMBER}" \
            -out=tfplan

      # =====================================================
      # APPLY
      # =====================================================
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # =====================================================
      # OUTPUTS
      # =====================================================
      - name: Terraform Output
        run: terraform output

      # =====================================================
      # COMMENT PR
      # =====================================================
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ✅ PR Environment deployed successfully

              Environment:
              pr${process.env.PR_NUMBER}

              Terraform state:
              pr-${process.env.PR_NUMBER}.tfstate
              `
            })

  # =========================================================
  # AUTO DESTROY WHEN PR CLOSED
  # =========================================================
  destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================
      # AZURE LOGIN
      # =====================================================
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # =====================================================
      # TERRAFORM
      # =====================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =====================================================
      # TERRAFORM INIT
      # =====================================================
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=pr-${PR_NUMBER}.tfstate"

      # =====================================================
      # DESTROY
      # =====================================================
      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var="environment_suffix=pr${PR_NUMBER}"